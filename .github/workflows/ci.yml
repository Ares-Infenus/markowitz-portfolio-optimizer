name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ruff black
      - name: Run ruff
        run: ruff check src/ tests/
      - name: Run black (check mode)
        run: black --check src/ tests/

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: |
          cp .env.example .env
          python -m pytest --cov=src --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp .env.example .env
      - name: Build optimizer image
        run: docker build -f docker/Dockerfile.optimizer -t markowitz-optimizer .
      - name: Build dashboard image
        run: docker build -f docker/Dockerfile.dashboard -t markowitz-dashboard .
